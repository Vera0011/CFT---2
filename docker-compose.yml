services:
  bastion:
    image: vera-bastion-image:latest
    container_name: vera-bastion
    build:
      context: machines/bastion
      dockerfile: Dockerfile
    hostname: vera-bastion
    volumes:
      - ./flags/flag1.txt:/usr/share/nginx/html/.git
    ports:
      - 80
      - 443
      - 22
    cap_add:
      - NET_ADMIN
    networks:
      public_net:
        ipv4_address: 172.18.0.2
        interface_name: eth0
      private_net:
        ipv4_address: 192.168.10.2
        interface_name: eth1
