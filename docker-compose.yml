networks:
  public_net:
    driver: bridge
    enable_ipv4: true
    ipam:
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1
          ip_range: 172.18.0.0/24
  private_net:
    driver: bridge
    enable_ipv4: true
    internal: true
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.1
          ip_range: 192.168.10.0/24