server {
    listen 80;
    server_name bastion.lab;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bastion.lab;

    ssl_certificate     /etc/nginx/certs/bastion.crt;
    ssl_certificate_key /etc/nginx/certs/bastion.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =200;
    }
}